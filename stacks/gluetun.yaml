# =============================================================================
# Gluetun - VPN Client Container
# =============================================================================
# Gluetun creates a VPN tunnel that other containers route through.
# Only qBittorrent uses this tunnel — all other services stay on the
# local network unaffected.
#
# HOW IT WORKS:
#   qBittorrent sets network_mode: "service:gluetun", which means it shares
#   Gluetun's network stack. All qBittorrent traffic (including torrent
#   downloads) goes through the VPN. Gluetun also handles port forwarding
#   so peers can connect to you for better speeds.
#
# PROVIDER: ProtonVPN (Plus plan required for port forwarding)
# PROTOCOL: WireGuard (faster than OpenVPN — lower overhead, higher throughput)
#
# SETUP:
#   1. Go to https://account.proton.me → VPN → WireGuard
#   2. Select Linux as platform, enable port forwarding
#   3. Download the .conf file and copy the PrivateKey value
#   4. Add to .env: PROTONVPN_WIREGUARD_KEY=<your-private-key>
#   5. docker compose up -d gluetun qbittorrent
#
# VERIFY VPN IS WORKING:
#   docker exec gluetun wget -qO- https://ipinfo.io
#   (should show VPN IP, not your home IP)
#
# =============================================================================

services:
  gluetun:
    image: qmcgaw/gluetun:v3.41.1
    container_name: gluetun
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETUID
      - SETGID
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - TZ=${TZ:-UTC}
      # --- ProtonVPN via WireGuard ---
      - VPN_SERVICE_PROVIDER=protonvpn
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${PROTONVPN_WIREGUARD_KEY:?Set PROTONVPN_WIREGUARD_KEY in .env}
      # Server selection — connect to a P2P-optimized server
      - SERVER_COUNTRIES=${PROTONVPN_COUNTRY:-Netherlands}
      # --- Port forwarding (requires ProtonVPN Plus) ---
      # Gluetun automatically requests a forwarded port via NAT-PMP.
      # The port is saved to /tmp/gluetun/forwarded_port for qBittorrent.
      - VPN_PORT_FORWARDING=on
      - VPN_PORT_FORWARDING_PROVIDER=protonvpn
      # Allow qBittorrent's web UI and Gluetun control server through firewall
      - FIREWALL_INPUT_PORTS=8080,8000
      # Enable HTTP control server for Homepage widget (shows VPN public IP)
      - HTTP_CONTROL_SERVER_ADDRESS=:8000
    # qBittorrent's web UI port — exposed here because qBittorrent shares
    # Gluetun's network stack (network_mode: service:gluetun)
    ports: []
    volumes:
      - gluetun_data:/gluetun
    networks:
      - proxy
    healthcheck:
      # Verify the VPN tunnel is actually up by checking for a non-empty public
      # IP. The previous check only verified the control server responded, which
      # allowed the container to report HEALTHY even when the tunnel was down.
      # With this check, Docker will restart the container after 5 failed checks
      # (~150s) if the VPN doesn't recover on its own.
      test: ["CMD-SHELL", "[ \"$(wget -qO- http://localhost:8000/v1/publicip/ip)\" != '{\"public_ip\":\"\"}' ]"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128m

volumes:
  gluetun_data:
    name: gluetun_data

networks:
  proxy:
    external: true
