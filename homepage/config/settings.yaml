# Homepage dashboard settings
# Docs: https://gethomepage.dev/configs/settings/

title: Home Server

theme: dark
color: stone
headerStyle: clean
useEqualHeights: true

background:
  image: https://w.wallhaven.cc/full/28/wallhaven-285v3m.jpg
  brightness: 60  # NieR wallpaper is already dark — let 2B show through
  saturate: 100   # monochrome image, no need to desaturate
  opacity: 90

layout:
  Infrastructure:
    style: column

  Security:
    style: column

  Media:
    style: column

  Downloads:
    style: column

  Smart Home:
    style: column

  Sync:
    style: column

  Observability:
    style: column
