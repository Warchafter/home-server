# Homepage dashboard settings
# Docs: https://gethomepage.dev/configs/settings/

title: Home Server

theme: dark
color: indigo
headerStyle: clean
useEqualHeights: true

background:
  image: https://w.wallhaven.cc/full/vg/wallhaven-vg33w3.jpg
  blur: sm
  brightness: 30  # enough to see mood/color without blinding highlights
  saturate: 60    # desaturated so neon blobs don't compete
  opacity: 90

layout:
  Infrastructure:
    style: row
    columns: 3

  Security:
    style: column    # compact list — Vaultwarden alone doesn't need a full card row

  Media:
    style: row
    columns: 3

  Downloads:
    style: row
    columns: 3

  Smart Home:
    style: column    # compact — single card

  Sync:
    style: column    # compact — single card

  Observability:
    style: row
    columns: 5      # fit all 5 monitoring services in one dense row
