# Homepage dashboard settings
# Docs: https://gethomepage.dev/configs/settings/

title: Home Server

theme: dark
color: indigo
headerStyle: clean
cardBlur: md
useEqualHeights: true

background:
  image: https://w.wallhaven.cc/full/vg/wallhaven-vg33w3.jpg
  blur: sm        # NOTE: keep this at sm or remove — higher values conflict with cardBlur
  brightness: 30  # darken significantly so cards stay readable
  saturate: 75    # slightly desaturated — lets the indigo accent color pop
  opacity: 90

layout:
  Infrastructure:
    style: row
    columns: 3

  Security:
    style: column    # compact list — Vaultwarden alone doesn't need a full card row

  Media:
    style: row
    columns: 3

  Downloads:
    style: row
    columns: 3

  Smart Home:
    style: column    # compact — single card

  Sync:
    style: column    # compact — single card

  Observability:
    style: row
    columns: 5      # fit all 5 monitoring services in one dense row
