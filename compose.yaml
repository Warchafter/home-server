# =============================================================================
# Home Server - Docker Compose Root
# =============================================================================
# This is the main entry point. Run everything with:
#
#   docker compose up -d          Start all services
#   docker compose down            Stop all services
#   docker compose ps              See running services
#   docker compose logs -f caddy   Follow logs for a specific service
#
# Each service is defined in its own file under stacks/ for readability.
# The 'include' directive merges them into a single Compose application,
# so all services share networks and can reference each other by name.
# =============================================================================

include:
  # --- Phase 1: Foundation ---
  - path: stacks/caddy.yaml
  - path: stacks/adguard.yaml
  - path: stacks/uptime-kuma.yaml
  - path: stacks/dockerproxy.yaml
  - path: stacks/homepage.yaml
  # --- Phase 2: Core Services ---
  - path: stacks/vaultwarden.yaml
  - path: stacks/vaultwarden-backup.yaml
  - path: stacks/jellyfin.yaml
  - path: stacks/sonarr.yaml
  - path: stacks/radarr.yaml
  - path: stacks/bazarr.yaml
  - path: stacks/prowlarr.yaml
  - path: stacks/gluetun.yaml
  - path: stacks/qbittorrent.yaml
  - path: stacks/homeassistant.yaml
  - path: stacks/syncthing.yaml
  # --- Infrastructure ---
  - path: stacks/autoheal.yaml
  # --- Phase 3: Advanced ---
  - path: stacks/prometheus.yaml
  - path: stacks/grafana.yaml
  - path: stacks/node-exporter.yaml
  - path: stacks/cadvisor.yaml
  - path: stacks/kavita.yaml
  - path: stacks/calibre-web.yaml
  - path: stacks/profilarr.yaml

# =============================================================================
# Shared Networks
# =============================================================================
# proxy:      All user-facing services join this network so Caddy can
#             reverse-proxy to them by container name. Docker's built-in DNS
#             resolves names automatically on user-defined bridge networks.
#
# monitoring: Isolated network for Prometheus, Node Exporter, cAdvisor, and
#             Grafana. Keeps host metrics (CPU, RAM, disk, processes) away
#             from application containers. Grafana is on BOTH networks —
#             proxy (so Caddy can reach it) and monitoring (so it can query
#             Prometheus).
# =============================================================================
networks:
  proxy:
    name: proxy
    driver: bridge
  monitoring:
    name: monitoring
    driver: bridge
